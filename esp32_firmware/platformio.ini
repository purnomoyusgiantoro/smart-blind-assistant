; PlatformIO Project Configuration File
; Smart Blind Assistant - ESP32-C3 BLE Firmware
;
; Komunikasi via BLE (bukan WiFi) ke app Flutter

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; BLE library (NimBLE lebih ringan dan stabil untuk ESP32-C3)
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0

build_flags =
    -D CONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -D CONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -D CONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -D CONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
